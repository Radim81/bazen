<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bazén Kohutovi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>🏊 Bazén Kohutovi</h1>

    <section class="cards">
      <div class="card">
        <h2>💧 Voda</h2>
        <div class="value" id="voda">--.-- °C</div>
      </div>

      <div class="card">
        <h2>🏠 Střecha</h2>
        <div class="value" id="strecha">--.-- °C</div>
      </div>
    </section>

    <p id="cas" class="time">Načítám data...</p>
    <p id="stav" class="status">Čekám na ThingSpeak...</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
